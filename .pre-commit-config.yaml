# Hooks de pre-commit. Instala con:
#   pip install pre-commit
#   pre-commit install
#
# Cada commit ejecuta automáticamente:
# - ruff check --fix (lint + autofixes seguros)
# - ruff format     (formato consistente)
# - validaciones básicas de archivos (trailing whitespace, fin de fichero, etc.)

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Lint con autofix.
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Formato.
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
