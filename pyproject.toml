[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
# Conjunto pragmático: errores reales y mantenibilidad sin ser dogmático.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (vars sin usar, imports sin usar)
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear (bugs comunes)
    "UP",  # pyupgrade (sintaxis moderna)
    "SIM", # flake8-simplify
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",     # line-too-long (cubierto por formatter)
    "B008",     # function call in default argument (común en discord.py)
    "SIM108",   # if-else → ternary (a veces menos legible)
    "SIM102",   # collapsible-if (legibilidad subjetiva)
    "SIM105",   # suppressible-exception (estilo, no es bug)
    "SIM117",   # multiple-with-statements (legibilidad subjetiva)
    "SIM118",   # in-dict-keys (cosmético)
]

[tool.ruff.lint.per-file-ignores]
"tests/*"   = ["E402", "F401", "B007"]  # imports late, fixtures, unused loop vars
"scripts/*" = ["E402"]  # scripts one-off pueden tener orden libre

# La configuración de pytest vive en pytest.ini (mantenido por compatibilidad).
